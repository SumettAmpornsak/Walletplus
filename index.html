<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes" />
    <meta name="theme-color" content="#0F0F1A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>เป๋าพลัส | หน้าหลัก</title>
    <link rel="icon" href="https://i.ibb.co/VYdqpR1M/Walletplus.png" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1c1c2e;
            --surface2: #252540;
            --surface3: #2e2e50;
            --accent: #6c63ff;
            --inc: #00d2a0;
            --exp: #ff6584;
            --warn: #ffb347;
            --text: #e8e8f0;
            --text2: #9090b0;
            --border: rgba(255, 255, 255, 0.07);
            --r: 18px;
            --r-sm: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "Kanit", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* spin animation for Bootstrap Icons loading */
        .bi-spin {
            animation: bi-spin 1s linear infinite;
        }

        @keyframes bi-spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* TOP BAR */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding-top: env(safe-area-inset-top, 0);
        }

        .top-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 16px;
        }

        .logo {
            font-size: 1.35rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6c63ff, #ff6584);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sync-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.68rem;
            padding: 5px 11px;
            border-radius: 50px;
            border: 1px solid;
            font-weight: 500;
            transition: all 0.3s;
        }

        .sync-pill.ok {
            color: var(--inc);
            border-color: rgba(0, 210, 160, 0.25);
            background: rgba(0, 210, 160, 0.08);
        }

        .sync-pill.loading {
            color: var(--warn);
            border-color: rgba(255, 179, 71, 0.3);
            background: rgba(255, 179, 71, 0.08);
        }

        .sync-pill.err {
            color: var(--exp);
            border-color: rgba(255, 101, 132, 0.3);
            background: rgba(255, 101, 132, 0.08);
        }

        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .sync-pill.loading .sync-dot {
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        .nav-report-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 7px 13px;
            border-radius: 50px;
            font-family: "Kanit", sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-report-btn:hover,
        .nav-report-btn:active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* USER SWITCHER */
        .user-bar {
            display: flex;
            gap: 8px;
            padding: 20px 10px 20px 10px;
        }

        .user-chip {
            flex: 1;
            padding: 9px 10px;
            border-radius: var(--r-sm);
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-family: "Kanit", sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .user-chip.active {
            background: rgba(108, 99, 255, 0.12);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* MAIN */
        .main {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 0 110px;
        }

        /* HERO */
        .hero {
            margin: 14px 16px;
            background: linear-gradient(145deg, #1e1e38, #242448);
            border-radius: 24px;
            padding: 22px 20px;
            border: 1px solid rgba(108, 99, 255, 0.18);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(108, 99, 255, 0.28) 0%, transparent 65%);
            pointer-events: none;
        }

        .hero::after {
            content: "";
            position: absolute;
            bottom: -35px;
            left: -25px;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, rgba(255, 101, 132, 0.18) 0%, transparent 65%);
            pointer-events: none;
        }

        .hero-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .hero-label {
            font-size: 0.72rem;
            color: var(--text2);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .hero-bal {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
            transition: color 0.4s;
        }

        .hero-bal.pos {
            color: var(--inc);
        }

        .hero-bal.neg {
            color: var(--exp);
        }

        .hero-month-sel {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: "Kanit", sans-serif;
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: var(--r-sm);
            outline: none;
            cursor: pointer;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .hstat {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 11px 13px;
            border: 1px solid var(--border);
        }

        .hstat-label {
            font-size: 0.68rem;
            color: var(--text2);
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hstat-val {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .hstat-val.inc {
            color: var(--inc);
        }

        .hstat-val.exp {
            color: var(--exp);
        }

        /* BUDGET BAR */
        .budget-bar-wrap {
            margin: 0 16px 14px;
            background: var(--surface);
            border-radius: var(--r);
            padding: 14px 16px;
            border: 1px solid var(--border);
        }

        .budget-bar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .budget-bar-title {
            font-size: 0.75rem;
            color: var(--text2);
            font-weight: 600;
        }

        .budget-bar-vals {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .budget-track {
            height: 8px;
            background: var(--surface3);
            border-radius: 50px;
            overflow: hidden;
        }

        .budget-fill {
            height: 100%;
            border-radius: 50px;
            transition: width 0.5s ease, background 0.3s;
        }

        .budget-set-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
            font-family: "Kanit", sans-serif;
            font-size: 0.7rem;
            padding: 3px 9px;
            border-radius: 50px;
            cursor: pointer;
            margin-left: 8px;
            transition: all 0.2s;
        }

        .budget-set-btn:active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* SECTION */
        .section {
            margin: 0 16px 16px;
        }

        .section-title {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        /* FORM */
        .form-card {
            background: var(--surface);
            border-radius: var(--r);
            padding: 18px;
            border: 1px solid var(--border);
        }

        .type-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .type-btn {
            padding: 10px 8px;
            border-radius: var(--r-sm);
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-family: "Kanit", sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .type-btn.ai {
            background: rgba(0, 210, 160, 0.1);
            border-color: var(--inc);
            color: var(--inc);
        }

        .type-btn.ae {
            background: rgba(255, 101, 132, 0.1);
            border-color: var(--exp);
            color: var(--exp);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            font-size: 0.75rem;
            color: var(--text2);
            margin-bottom: 5px;
            font-weight: 500;
            display: block;
        }

        .form-input,
        .form-select {
            width: 100%;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text);
            font-family: "Kanit", sans-serif;
            font-size: 0.95rem;
            padding: 11px 13px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--accent);
        }

        .form-input::placeholder {
            color: rgba(144, 144, 176, 0.4);
        }

        .form-select option {
            background: #1c1c2e;
        }

        .amt-wrap {
            position: relative;
        }

        .amt-pre {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text2);
            font-size: 0.9rem;
        }

        .amt-wrap .form-input {
            padding-left: 26px;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            border-radius: var(--r-sm);
            border: none;
            font-family: "Kanit", sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: all 0.18s;
            margin-top: 4px;
        }

        .submit-btn.si {
            background: var(--inc);
            color: #071a12;
        }

        .submit-btn.se {
            background: var(--exp);
            color: #1a070d;
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        .submit-btn:disabled {
            opacity: 0.45;
        }

        /* SEARCH + FILTER */
        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .search-input {
            flex: 1;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text);
            font-family: "Kanit", sans-serif;
            font-size: 0.9rem;
            padding: 10px 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: rgba(144, 144, 176, 0.4);
        }

        .filter-btn {
            background: var(--surface);
            border: 1.5px solid var(--border);
            color: var(--text2);
            border-radius: var(--r-sm);
            padding: 10px 13px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: "Kanit", sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
        }

        .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(108, 99, 255, 0.08);
        }

        .filter-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .chip {
            padding: 5px 12px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-family: "Kanit", sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.18s;
            white-space: nowrap;
        }

        .chip.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(108, 99, 255, 0.1);
        }

        /* TX ITEMS */
        .tx-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tx-item {
            background: var(--surface);
            border-radius: var(--r-sm);
            padding: 12px 13px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            animation: fadeUp 0.22s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tx-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .tx-icon.i {
            background: rgba(0, 210, 160, 0.14);
            color: var(--inc);
        }

        .tx-icon.e {
            background: rgba(255, 101, 132, 0.14);
            color: var(--exp);
        }

        .tx-info {
            flex: 1;
            min-width: 0;
        }

        .tx-desc {
            font-size: 0.92rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tx-meta {
            font-size: 0.68rem;
            color: var(--text2);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tx-cat-badge {
            background: var(--surface2);
            border-radius: 50px;
            padding: 1px 8px;
            font-size: 0.65rem;
        }

        .tx-user-badge {
            border-radius: 50px;
            padding: 1px 8px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .tx-user-badge.u0 {
            background: rgba(108, 99, 255, 0.15);
            color: #04cf07;
        }

        .tx-user-badge.u1 {
            background: rgba(255, 101, 132, 0.15);
            color: #0e9cd9;
        }

        .tx-right {
            text-align: right;
            flex-shrink: 0;
        }

        .tx-amt {
            font-size: 0.98rem;
            font-weight: 700;
        }

        .tx-amt.i {
            color: var(--inc);
        }

        .tx-amt.e {
            color: var(--exp);
        }

        .tx-acts {
            display: flex;
            gap: 3px;
            margin-top: 4px;
            justify-content: flex-end;
        }

        .tx-btn {
            background: transparent;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 0.78rem;
            padding: 4px 7px;
            border-radius: 7px;
            transition: all 0.15s;
        }

        .tx-btn.edit:active {
            color: var(--accent);
            background: rgba(108, 99, 255, 0.12);
        }

        .tx-btn.del:active {
            color: var(--exp);
            background: rgba(255, 101, 132, 0.12);
        }

        /* EMPTY */
        .empty-state {
            text-align: center;
            padding: 36px 20px;
            color: var(--text2);
        }

        .empty-state i {
            font-size: 2.4rem;
            margin-bottom: 10px;
            opacity: 0.22;
        }

        .empty-state p {
            font-size: 0.85rem;
            line-height: 1.7;
        }

        /* COUNT / EXPORT */
        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .count-badge {
            background: var(--surface2);
            color: var(--text2);
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 50px;
            font-weight: 500;
        }

        .export-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
            font-family: "Kanit", sans-serif;
            font-size: 0.72rem;
            padding: 4px 11px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .export-btn:active {
            border-color: var(--inc);
            color: var(--inc);
        }

        /* CLEAR */
        .clear-btn {
            width: 100%;
            padding: 12px;
            border-radius: var(--r-sm);
            border: 1.5px solid rgba(255, 101, 132, 0.22);
            background: rgba(255, 101, 132, 0.05);
            color: var(--exp);
            font-family: "Kanit", sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: all 0.2s;
        }

        .clear-btn:active {
            background: rgba(255, 101, 132, 0.14);
        }

        .footer {
            text-align: center;
            padding: 18px 16px;
            font-size: 1.0rem;
            color: var(--text2);
            opacity: 0.4;
            line-height: 1.9;
            padding-bottom: env(safe-area-inset-bottom, 18px);
        }

        /* SWAL */
        .swal2-popup {
            background: var(--surface) !important;
            color: var(--text) !important;
            border-radius: 24px !important;
            border: 1px solid var(--border) !important;
            font-family: "Kanit", sans-serif !important;
        }

        .swal2-title {
            color: var(--text) !important;
            font-family: "Kanit", sans-serif !important;
        }

        .swal2-html-container {
            color: var(--text2) !important;
        }

        .swal2-input,
        .swal2-select {
            background: var(--surface2) !important;
            border: 1.5px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: 12px !important;
            font-family: "Kanit", sans-serif !important;
        }

        .swal2-confirm {
            background: var(--accent) !important;
            font-family: "Kanit", sans-serif !important;
            border-radius: 10px !important;
        }

        .swal2-cancel {
            background: var(--surface3) !important;
            font-family: "Kanit", sans-serif !important;
            color: var(--text2) !important;
            border-radius: 10px !important;
        }
    </style>
    <style>
        #pin-overlay {
            position: fixed; inset: 0; z-index: 99999;
            background: #0f0f1a;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Kanit', sans-serif;
        }
        #pin-overlay.hidden { display: none; }
        .pin-box {
            background: #1c1c2e;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 24px;
            padding: 36px 28px 28px;
            width: 320px;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .pin-logo {
            font-size: 1.5rem; font-weight: 800;
            background: linear-gradient(135deg, #6c63ff, #ff6584);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; margin-bottom: 6px;
        }
        .pin-title {
            font-size: .95rem; font-weight: 600; color: #e8e8f0;
            margin-bottom: 4px;
        }
        .pin-sub {
            font-size: .75rem; color: #9090b0; margin-bottom: 22px;
        }
        .pin-dots {
            display: flex; justify-content: center; gap: 10px;
            margin-bottom: 24px;
        }
        .pin-dot {
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid #3a3a5c;
            background: transparent;
            transition: all .2s;
        }
        .pin-dot.filled { background: #6c63ff; border-color: #6c63ff; }
        .pin-dot.error { background: #ff6584; border-color: #ff6584; animation: shake .3s; }
        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
        }
        .pin-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 0;
        }
        .pin-key {
            background: #252540; border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 16px 0;

        }
        .pin-key:active { background: #6c63ff; transform: scale(.94); }
        .pin-key.del { font-size: .95rem; color: #9090b0; }
        .pin-key.empty { background: transparent; border-color: transparent; cursor: default; }
        .pin-error-msg {
            color: #ff6584; font-size: .78rem; margin-top: 14px;
            min-height: 20px; transition: opacity .2s;
        }
    </style>
    <div id="pin-overlay">
        <div class="pin-box">
            <div class="pin-logo">เป๋าพลัส</div>
            <div class="pin-title">ใส่รหัส PIN</div>
            <div class="pin-sub">กรอก PIN 6 หลักเพื่อเข้าใช้งาน</div>
            <div class="pin-dots" id="pinDots">
                <div class="pin-dot" id="pd0"></div>
                <div class="pin-dot" id="pd1"></div>
                <div class="pin-dot" id="pd2"></div>
                <div class="pin-dot" id="pd3"></div>
                <div class="pin-dot" id="pd4"></div>
                <div class="pin-dot" id="pd5"></div>
            </div>
            <div class="pin-grid">
                <button class="pin-key" onclick="pinKey('1')">1</button>
                <button class="pin-key" onclick="pinKey('2')">2</button>
                <button class="pin-key" onclick="pinKey('3')">3</button>
                <button class="pin-key" onclick="pinKey('4')">4</button>
                <button class="pin-key" onclick="pinKey('5')">5</button>
                <button class="pin-key" onclick="pinKey('6')">6</button>
                <button class="pin-key" onclick="pinKey('7')">7</button>
                <button class="pin-key" onclick="pinKey('8')">8</button>
                <button class="pin-key" onclick="pinKey('9')">9</button>
                <button class="pin-key empty" disabled></button>
                <button class="pin-key" onclick="pinKey('0')">0</button>
                <button class="pin-key del" onclick="pinDel()">&#9003;</button>
            </div>
            <div class="pin-error-msg" id="pinErr"></div>
        </div>
    </div>
    <script>
        (function () {
            var VALID = ['162444', '220339'];
            var entered = '';
            if (sessionStorage.getItem('pin_ok') === '1') {
                document.getElementById('pin-overlay').classList.add('hidden');
                return;
            }
            function updateDots(err) {
                for (var i = 0; i < 6; i++) {
                    var d = document.getElementById('pd' + i);
                    d.className = 'pin-dot';
                    if (err) d.classList.add('error');
                    else if (i < entered.length) d.classList.add('filled');
                }
            }
            window.pinKey = function (k) {
                if (entered.length >= 6) return;
                entered += k;
                updateDots(false);
                document.getElementById('pinErr').textContent = '';
                if (entered.length === 6) {
                    if (VALID.indexOf(entered) !== -1) {
                        sessionStorage.setItem('pin_ok', '1');
                        document.getElementById('pin-overlay').classList.add('hidden');
                    } else {
                        updateDots(true);
                        document.getElementById('pinErr').textContent = 'รหัส PIN ไม่ถูกต้อง กรุณาลองใหม่';
                        setTimeout(function () { entered = ''; updateDots(false); document.getElementById('pinErr').textContent = ''; }, 900);
                    }
                }
            };
            window.pinDel = function () {
                if (!entered.length) return;
                entered = entered.slice(0, -1);
                updateDots(false);
                document.getElementById('pinErr').textContent = '';
            };
            document.addEventListener('keydown', function (e) {
                if (document.getElementById('pin-overlay').classList.contains('hidden')) return;
                if (e.key >= '0' && e.key <= '9') pinKey(e.key);
                else if (e.key === 'Backspace') pinDel();
            });
        })();
    </script>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";

        const firebaseConfig = {

        const CATS_INC = [" เงินเดือน", "รายได้เสริม", "รับของขวัญ", "ลงทุน", "ค่าเช่า", "อื่นๆ"];
        const CATS_EXP = ["อาหาร", "เดินทาง", "ค่าน้ำมัน", "ช็อปปิ้ง", "ค่าเช่า", "บันเทิง", "สุขภาพ", "การศึกษา", "เสื้อผ้า", "คู่รัก", "อื่นๆ"];

        function buildMonthOptions() {
            const sel = document.getElementById("monthSel");

            sel.innerHTML = '<option value="">ทุกเดือน</option>';
            for (let i = 0; i < 12; i++) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                const val = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
                const label = d.toLocaleDateString("th-TH", { month: "short", year: "numeric" });
                sel.innerHTML += `<option value="${val}">${label}</option>`;
            }
        }

        function populateCats() {
            const cats = curType === "income" ? CATS_INC : CATS_EXP;
            document.getElementById("category").innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join("");
        }

        window.switchUser = (u) => {
            curUser = u;
            document.getElementById("chip0").className = "user-chip" + (u === 0 ? " active" : "");
            document.getElementById("chip1").className = "user-chip" + (u === 1 ? " active" : "");
        };

        window.editNames = async () => {
            const { value: v } = await Swal.fire({
                title: '<span style="font-family:Kanit">ตั้งชื่อผู้ใช้</span>',
                html: `<div style="display:flex;flex-direction:column;gap:10px;margin-top:10px">
                        <div><label style="font-size:1rem;color:#04cf07;display:block;margin-bottom:5px;font-family:Kanit"> ชื่อคนที่ 1</label>
                        <input id="n0" class="swal2-input" style="margin:0;width:100%" value="${esc(settings.name0)}"></div>
                        <div><label style="font-size:1rem;color:#0e9cd9;display:block;margin-bottom:5px;font-family:Kanit">ชื่อคนที่ 2</label>
                        <input id="n1" class="swal2-input" style="margin:0;width:100%" value="${esc(settings.name1)}"></div>
                        </div>`,
                showCancelButton: true,
                confirmButtonText: "บันทึก",
                cancelButtonText: "ยกเลิก",
                preConfirm: () => ({
                    name0: document.getElementById("n0").value.trim() || "น้องปิ๊งๆ",
                    name1: document.getElementById("n1").value.trim() || "พี่ปลาย",
                }),
            });
            if (v) await set(settingsRef, v);
        };

        window.setType = (type) => {
            curType = type;
            populateCats();
            const bi = document.getElementById("btnI"), be = document.getElementById("btnE"), btn = document.getElementById("submitBtn");
            if (type === "income") {
                bi.className = "type-btn ai";
                be.className = "type-btn";
                btn.className = "submit-btn si";
                btn.innerHTML = '<i class="bi bi-save"></i> บันทึกรายรับ';
            } else {
                bi.className = "type-btn";
                be.className = "type-btn ae";
                btn.className = "submit-btn se";
                btn.innerHTML = '<i class="bi bi-save"></i> บันทึกรายจ่าย';
            }
        };

        window.addTx = async () => {
            const desc = document.getElementById("desc").value.trim();
            const amount = parseFloat(document.getElementById("amount").value);
            const category = document.getElementById("category").value;
            if (!desc) return toast("warning", "กรุณากรอกชื่อรายการ");
            if (isNaN(amount) || amount <= 0) return toast("error", "จำนวนเงินต้องมากกว่า 0");
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat bi-spin"></i> กำลังบันทึก...';
            try {
                const now = new Date();
                await push(txRef, {
                    desc, type: curType, amount, category, user: curUser,
                    date: now.toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "numeric" }),
                    monthKey: `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`,
                    timestamp: Date.now(),
                });
                document.getElementById("desc").value = "";
                document.getElementById("amount").value = "";
                toast("success", "บันทึกเรียบร้อย ✓");
            } catch (e) {
                Swal.fire({ icon: "error", title: "เกิดข้อผิดพลาด", text: e.message });
            }
            btn.disabled = false;
            window.setType(curType);
        };

        window.deleteTx = async (key) => {
            const r = await Swal.fire({ title: "ลบรายการนี้?", text: "ไม่สามารถกู้คืนได้", icon: "warning", showCancelButton: true, confirmButtonText: "ลบเลย", cancelButtonText: "ยกเลิก", confirmButtonColor: "#FF6584" });
            if (r.isConfirmed) { await remove(ref(db, `transactions/${key}`)); toast("success", "ลบแล้ว"); }
        };

        window.editTx = async (key) => {
            const t = allTx[key];
            if (!t) return;
            const cats = t.type === "income" ? CATS_INC : CATS_EXP;
            const catOpts = cats.map(c => `<option value="${c}" ${t.category === c ? "selected" : ""}>${c}</option>`).join("");
            const { value: v } = await Swal.fire({
                title: '<span style="font-family:Kanit;font-size:1.05rem">แก้ไขรายการ</span>',
                html: `<div style="text-align:left;display:flex;flex-direction:column;gap:11px;margin-top:10px">
                        <div><label style="font-size:.75rem;color:#9090B0;display:block;margin-bottom:4px;font-family:Kanit">ชื่อรายการ</label>
                        <input id="ed" class="swal2-input" style="margin:0;width:100%" value="${esc(t.desc)}"></div>
                        <div><label style="font-size:.75rem;color:#9090B0;display:block;margin-bottom:4px;font-family:Kanit">ประเภท</label>
                        <select id="et" class="swal2-select" style="width:100%;padding:10px 13px;margin:0">
                        <option value="income" ${t.type === "income" ? "selected" : ""}>🟢 รายรับ</option>
                        <option value="expense" ${t.type === "expense" ? "selected" : ""}>🔴 รายจ่าย</option>
                        </select></div>
                        <div><label style="font-size:.75rem;color:#9090B0;display:block;margin-bottom:4px;font-family:Kanit">หมวดหมู่</label>
                        <select id="ec" class="swal2-select" style="width:100%;padding:10px 13px;margin:0">${catOpts}</select></div>
                        <div><label style="font-size:.75rem;color:#9090B0;display:block;margin-bottom:4px;font-family:Kanit">จำนวนเงิน (บาท)</label>
                        <input id="ea" type="number" class="swal2-input" style="margin:0;width:100%" value="${t.amount}" min="0" step="any"></div>
                        </div>`,
                showCancelButton: true,
                confirmButtonText: "บันทึก",
                cancelButtonText: "ยกเลิก",
                preConfirm: () => {
                    const d = document.getElementById("ed").value.trim();
                    const tp = document.getElementById("et").value;
                    const cat = document.getElementById("ec").value;
                    const a = parseFloat(document.getElementById("ea").value);
                    if (!d || isNaN(a) || a <= 0) { Swal.showValidationMessage("กรอกข้อมูลให้ถูกต้อง"); return false; }
                    return { desc: d, type: tp, category: cat, amount: a };
                },
            });
            if (v) { await update(ref(db, `transactions/${key}`), v); toast("success", "อัปเดตแล้ว ✓"); }
        };

        window.clearAll = async () => {
            if (!Object.keys(allTx).length) return toast("info", "ไม่มีข้อมูลให้ล้าง");
            const r = await Swal.fire({ title: "ล้างข้อมูลทั้งหมด?", text: `จะลบ ${Object.keys(allTx).length} รายการ — ไม่สามารถกู้คืนได้!`, icon: "error", showCancelButton: true, confirmButtonText: "ล้างเลย!", cancelButtonText: "ยกเลิก", confirmButtonColor: "#FF6584" });
            if (r.isConfirmed) { await set(txRef, null); toast("success", "ล้างข้อมูลเรียบร้อย"); }
        };

        window.setBudget = async () => {
            const now = new Date();
            const mk = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
            const cur = budgets[mk] || 0;
            const { value } = await Swal.fire({ title: '<span style="font-family:Kanit">ตั้งงบประมาณเดือนนี้</span>', input: "number", inputValue: cur || "", inputPlaceholder: "จำนวนเงิน (บาท)", showCancelButton: true, confirmButtonText: "ตั้งเลย", cancelButtonText: "ยกเลิก", inputAttributes: { min: "0", step: "any" }, html: `<p style="font-size:.8rem;color:#9090B0;margin-bottom:10px;font-family:Kanit">งบรายจ่ายสำหรับ ${now.toLocaleDateString("th-TH", { month: "long", year: "numeric" })}</p>` });
            if (value !== undefined && value !== "") { await update(budgetRef, { [mk]: parseFloat(value) }); toast("success", "ตั้งงบประมาณแล้ว"); }
        };

        function updateBudgetBar(expenseThisMonth) {
            const now = new Date();
            const mk = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
            const budget = budgets[mk] || 0;
            const fill = document.getElementById("budgetFill");
            const vals = document.getElementById("budgetVals");
            if (!budget) { vals.textContent = "ยังไม่ตั้งงบ"; fill.style.width = "0%"; fill.style.background = "var(--inc)"; return; }
            const pct = Math.min((expenseThisMonth / budget) * 100, 100);
            fill.style.width = pct + "%";
            fill.style.background = pct >= 90 ? "var(--exp)" : pct >= 70 ? "var(--warn)" : "var(--inc)";
            vals.innerHTML = `<span style="color:${pct >= 90 ? "var(--exp)" : pct >= 70 ? "var(--warn)" : "var(--inc)"}">${fmt(expenseThisMonth)}</span> / ${fmt(budget)} ฿`;
        }

        window.onMonthChange = () => { selectedMonth = document.getElementById("monthSel").value; renderList(); };
        window.toggleFilter = () => { filterOpen = !filterOpen; document.getElementById("filterPanel").style.display = filterOpen ? "block" : "none"; document.getElementById("filterToggleBtn").className = "filter-btn" + (filterOpen ? " active" : ""); };
        window.setTypeFilter = (el, val) => { filterType = val; document.querySelectorAll("#typeChips .chip").forEach(c => c.classList.remove("active")); el.classList.add("active"); renderList(); };
        window.setCatFilter = (el, val) => { filterCat = filterCat === val ? "" : val; document.querySelectorAll("#catChips .chip").forEach(c => c.classList.remove("active")); if (filterCat) el.classList.add("active"); renderList(); };
        window.setUserFilter = (el, val) => { filterUser = val; document.querySelectorAll("#userChips .chip").forEach(c => c.classList.remove("active")); el.classList.add("active"); renderList(); };

        function buildCatChips(txList) {
            const cats = [...new Set(txList.map(t => t.category).filter(Boolean))];
            const cc = document.getElementById("catChips");
            cc.innerHTML = cats.map(c => `<button class="chip ${filterCat === c ? "active" : ""}" onclick="setCatFilter(this,'${esc(c)}')">${c}</button>`).join("");
        }

        window.exportCSV = () => {
            const sorted = getFiltered();
            if (!sorted.length) return toast("info", "ไม่มีข้อมูลให้ export");
            const n0 = settings.name0, n1 = settings.name1;
            const header = "ชื่อรายการ,ประเภท,หมวดหมู่,จำนวน,ผู้บันทึก,วันที่\n";
            const rows = sorted.map(t => `"${t.desc}","${t.type === "income" ? "รายรับ" : "รายจ่าย"}","${t.category || ""}",${t.amount},"${t.user === 0 ? n0 : n1}","${t.date || ""}"`).join("\n");
            const blob = new Blob(["\ufeff" + header + rows], { type: "text/csv;charset=utf-8;" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `walletplus_${new Date().toLocaleDateString("th-TH").replace(/\//g, "-")}.csv`;
            a.click();
            toast("success", "Export สำเร็จ!");
        };

        onValue(txRef, (snap) => { allTx = snap.val() || {}; document.getElementById("syncBadge").className = "sync-pill ok"; document.getElementById("syncText").textContent = "เชื่อมต่อสำเร็จ"; renderList(); }, () => { document.getElementById("syncBadge").className = "sync-pill err"; document.getElementById("syncText").textContent = "ขาดการเชื่อมต่อ"; });
        onValue(budgetRef, (snap) => { budgets = snap.val() || {}; renderList(); });
        onValue(settingsRef, (snap) => { if (snap.val()) { settings = snap.val(); document.getElementById("name0").textContent = settings.name0; document.getElementById("name1").textContent = settings.name1; document.getElementById("filterName0").textContent = settings.name0; document.getElementById("filterName1").textContent = settings.name1; } });

        function getFiltered() {
            const q = document.getElementById("searchInput").value.toLowerCase();
            return Object.entries(allTx).map(([key, val]) => ({ key, ...val })).filter(t => {
                if (selectedMonth && t.monthKey !== selectedMonth) return false;
                if (filterType && t.type !== filterType) return false;
                if (filterCat && t.category !== filterCat) return false;
                if (filterUser !== "" && String(t.user) !== String(filterUser)) return false;
                if (q && !t.desc.toLowerCase().includes(q) && !(t.category || "").toLowerCase().includes(q)) return false;
                return true;
            }).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        }

        window.renderList = function () {
            const list = document.getElementById("txList");
            const emptyMsg = document.getElementById("emptyMsg");
            let sumInc = 0, sumExp = 0;
            const now = new Date();
            const curMk = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
            let expThisMonth = 0;
            const allSorted = Object.entries(allTx).map(([key, val]) => ({ key, ...val }));
            allSorted.forEach(t => {
                if (selectedMonth && t.monthKey !== selectedMonth) return;
                const a = Number(t.amount);
                if (t.type === "income") sumInc += a;
                else sumExp += a;
            });
            allSorted.filter(t => t.monthKey === curMk && t.type === "expense").forEach(t => expThisMonth += Number(t.amount));
            const bal = sumInc - sumExp;
            const hb = document.getElementById("heroBalance");
            hb.textContent = "฿ " + fmt(bal);
            hb.className = "hero-bal" + (bal > 0 ? " pos" : bal < 0 ? " neg" : "");
            document.getElementById("totalIncome").textContent = "฿ " + fmt(sumInc);
            document.getElementById("totalExpense").textContent = "฿ " + fmt(sumExp);
            updateBudgetBar(expThisMonth);

            const sorted = getFiltered();
            buildCatChips(sorted);
            document.getElementById("recordCount").textContent = sorted.length + " รายการ";
            list.querySelectorAll(".tx-item").forEach(el => el.remove());
            if (!sorted.length) { emptyMsg.style.display = "block"; return; }
            emptyMsg.style.display = "none";
            sorted.forEach(t => {
                const isI = t.type === "income";
                const amt = Number(t.amount);
                const uName = t.user === 0 ? settings.name0 : settings.name1;
                const uClass = t.user === 0 ? "u0" : "u1";
                const el = document.createElement("div");
                el.className = "tx-item";
                el.innerHTML = `<div class="tx-icon ${isI ? "i" : "e"}"><i class="bi ${isI ? "bi-arrow-down" : "bi-arrow-up"}"></i></div>
                                <div class="tx-info"><div class="tx-desc">${esc(t.desc)}</div><div class="tx-meta"><span>${t.date || "-"}</span>${t.category ? `<span class="tx-cat-badge">${t.category}</span>` : ""}<span class="tx-user-badge ${uClass}">${uName}</span></div></div>
                                <div class="tx-right"><div class="tx-amt ${isI ? "i" : "e"}">${isI ? "+" : "-"}${fmt(amt)}</div>
                                <div class="tx-acts"><button class="tx-btn edit" onclick="editTx('${t.key}')"><i class="bi bi-pencil-square"></i></button><button class="tx-btn del" onclick="deleteTx('${t.key}')"><i class="bi bi-trash"></i></button></div></div>`;
                list.appendChild(el);
            });
        };

        function fmt(n) { return Number(n).toLocaleString("th-TH", { maximumFractionDigits: 2 }); }
        function esc(s) { return String(s).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[m]); }
        function toast(icon, title) {
            const bg = icon === "success" ? "#0f1a12" : icon === "error" ? "#1a0f0d" : "#1C1C2E";
            const color = icon === "success" ? "#00D2A0" : icon === "error" ? "#FF6584" : "#E8E8F0";
            Swal.fire({ icon, title, toast: true, position: "top", showConfirmButton: false, timer: 1800, background: bg, color });
        }

        buildMonthOptions();
        populateCats();
        document.getElementById("desc").addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("amount").focus(); });
        document.getElementById("amount").addEventListener("keydown", (e) => { if (e.key === "Enter") window.addTx(); });
        window.setType("income");
    </script>
</body>
</html>
